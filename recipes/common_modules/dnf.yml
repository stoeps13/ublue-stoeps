---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
type: dnf
repos:
  cleanup: true
  copr:
    enable:
      - scottames/ghostty
      - eclipseo/espanso

install:
  skip-unavailable: true
  packages:
    - crash
    - edac-utils
    - espanso-wayland
    - fastfetch
    - fd-find
    - firewall-config
    - gcc
    - ghostty
    - guestfs-tools
    - kmodtool
    - libvirt-daemon-config-network
    - libvirt-daemon-kvm
    - lm_sensors
    - make
    - mkisofs
    - nmap-ncat
    - nss-tools
    - pass
    - playerctl
    - plymouth-plugin-script
    - podman-compose
    - podman-docker
    - powertop
    - python3-libvirt
    - python3-lxml
    - qemu
    - qemu-kvm
    - qemu-kvm
    - qemu-tools
    - qemu-user
    - rasdaemon
    - rclone
    - realtime-setup
    - setools-console
    - setroubleshoot-plugins
    - setroubleshoot-server
    - spice-glib
    - spice-gtk3
    - tailscale
    - uupd
    - v4l2loopback
    - vdirsyncer
    - virt-v2v
    - virt-install
    - virt-manager
    - virt-top
    - virt-viewer
    - zsh

# group-install:
#   with-optional: true
#   packages:
#     - development-tools
remove:
  packages:
    - toolbox
    - docker-ce
    - docker-ce-cli
    - docker-ce
    - docker-ce-rootless-extras
    - docker-compose-plugin
    - docker-buildx-plugin
