---
# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
type: dnf
repos:
  cleanup: true

install:
  packages:
    - acpid
    - binutils
    - crash
    - curl
    - edac-utils
    - efibootmgr
    - fastfetch
    - fd-find
    - firewall-config
    - gcc
    - guestfs-tools
    - kmodtool
    - libvirt-daemon-config-network
    - libvirt-daemon-kvm
    - lm_sensors
    - lm_sensors
    - make
    - mkisofs
    - nmap-ncat
    - nss-tools
    - nvme-cli
    - pass
    - plymouth-plugin-script
    - podman-compose
    - podman-docker
    - policycoreutils
    - powertop
    - python3-libvirt
    - python3-lxml
    - qemu-kvm
    - rasdaemon
    - rclone
    - setools-console
    - setroubleshoot-plugins
    - setroubleshoot-server
    - spice-glib
    - spice-gtk3
    - tailscale
    - virt-install
    - virt-manager
    - virt-top
    - virt-v2v
    - virt-viewer
    - zip
    - zsh
    # group-install:
    #   with-optional: true
    #   packages:
    #     - development-tools
remove:
  packages:
    - toolbox
    - docker-ce
    - docker-ce-cli
    - docker-ce
    - docker-ce-rootless-extras
    - docker-compose-plugin
    - docker-buildx-plugin
